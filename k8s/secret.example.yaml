apiVersion: v1
kind: Secret
metadata:
  name: joby-secrets
  namespace: joby
type: Opaque
stringData:
  # IMPORTANT: Do not commit real secret values.
  # For production, use kubectl create secret or external secrets management.
  ConnectionStrings__DefaultConnection: "Host=postgres-service;Database=joby;Username=postgres;Password=CHANGE_ME"
  Jwt__Secret: "CHANGE_ME_TO_A_SECURE_SECRET_AT_LEAST_32_CHARACTERS_LONG"
  POSTGRES_PASSWORD: "CHANGE_ME"

