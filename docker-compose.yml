services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: joby-postgres
    profiles:
      - local
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - joby-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: joby-backend
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - Jwt__Secret=${Jwt__Secret}
      - Jwt__Issuer=${Jwt__Issuer}
      - Jwt__Audience=${Jwt__Audience}
      - Jwt__AccessTokenExpirationMinutes=${Jwt__AccessTokenExpirationMinutes}
      - Jwt__RefreshTokenExpirationDays=${Jwt__RefreshTokenExpirationDays}
      - Cors__AllowedOrigins__0=${Cors__AllowedOrigins__0}
      - Cors__AllowedOrigins__1=${Cors__AllowedOrigins__1}
      - Cors__AllowedOrigins__2=${Cors__AllowedOrigins__2}
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - joby-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: joby-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - joby-network

  # Development frontend (with hot reload)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: joby-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    networks:
      - joby-network
    profiles:
      - dev

volumes:
  postgres_data:

networks:
  joby-network:
    driver: bridge
